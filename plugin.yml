name: ZyberPECustomEnchants
main: ApexCE\Main
version: 1.0
api: [5.0.0]
author: ZyberPE
description: Custom Enchants plugin with Driller, TreeDestroyer, Books, and Combat Enchants
commands:
  give:
    description: Apply an enchant directly to the item in hand
    usage: "/give <player> <enchant> <level>"
    permission: apexce.give
  givebook:
    description: Give an enchantment book
    usage: "/givebook <player> <enchant> <level>"
    permission: apexce.givebook
permissions:
  apexce.give:
    default: op
    description: Permission to give enchants
  apexce.givebook:
    default: op
    description: Permission to give enchantment books
